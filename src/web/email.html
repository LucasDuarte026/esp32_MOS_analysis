<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compor Email - ESP32 MOSFET Analyzer</title>
    <!-- Styles loaded dynamically via JS/CSS injection from dashboard -->
</head>

<body>
    <div class="card">
        <div class="card-header">
            <h2>Compor Email</h2>
        </div>
        <div class="card-body">
            <form id="email-form">

                <!-- Section 1: Server Configuration -->
                <fieldset class="form-section">
                    <legend>Configuração do Servidor (Remetente)</legend>

                    <div class="form-group">
                        <label for="smtp-provider">Provedor de Email</label>
                        <select id="smtp-provider" class="select-field">
                            <option value="gmail">Gmail (smtp.gmail.com)</option>
                            <option value="outlook">Outlook / Hotmail (smtp.office365.com)</option>
                            <option value="yahoo">Yahoo Mail</option>
                            <option value="custom">Outro (Configurar Manualmente)</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="smtp-host">Servidor SMTP</label>
                            <input type="text" id="smtp-host" class="input-field" value="smtp.gmail.com" readonly>
                        </div>
                        <div class="form-group">
                            <label for="smtp-port">Porta</label>
                            <input type="number" id="smtp-port" class="input-field" value="465" readonly>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="sender-email">Seu Email (Remetente)</label>
                        <input type="email" id="sender-email" class="input-field" placeholder="seu.email@exemplo.com"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="sender-password">
                            Senha de Aplicativo
                            <span class="info-icon"
                                title="Não use sua senha de login! Use uma Senha de Aplicativo.">?</span>
                        </label>
                        <input type="password" id="sender-password" class="input-field"
                            placeholder="Geralmente 16 caracteres" required>
                        <small class="helper-text">
                            ⚠️ <strong>Atenção:</strong> Você DEVE ativar a Autenticação de Dois Fatores (2FA) e criar
                            uma Senha de Aplicativo.
                            <br>
                            <a href="https://support.google.com/accounts/answer/185833" target="_blank">Tutorial
                                Gmail</a> |
                            <a href="https://support.microsoft.com/en-us/account-billing/using-app-passwords-with-apps-that-don-t-support-two-step-verification-5896ed9b-4263-e681-128a-a6f2979a7944"
                                target="_blank">Tutorial Outlook</a>
                        </small>
                    </div>
                </fieldset>

                <!-- Section 2: Recipients -->
                <fieldset class="form-section">
                    <legend>Destinatários</legend>

                    <div class="form-group">
                        <label for="email-recipients">Para (Destinatários)</label>
                        <input type="text" id="email-recipients" class="input-field"
                            placeholder="destinatario@exemplo.com, outro@exemplo.com" required>
                        <small class="helper-text">Separe múltiplos emails com vírgula</small>
                    </div>

                    <div class="form-group">
                        <label for="email-cc">CC (Cópia)</label>
                        <input type="text" id="email-cc" class="input-field" placeholder="chefe@exemplo.com">
                    </div>
                </fieldset>

                <!-- Section 3: Content -->
                <fieldset class="form-section">
                    <legend>Conteúdo</legend>

                    <div class="form-group">
                        <label for="email-subject">Assunto</label>
                        <input type="text" id="email-subject" class="input-field"
                            placeholder="Relatório de Análise MOSFET">
                    </div>

                    <div class="form-group">
                        <label for="email-message">Mensagem</label>
                        <textarea id="email-message" class="textarea-field" rows="5"
                            placeholder="Digite sua mensagem aqui..."></textarea>
                    </div>
                </fieldset>

                <!-- Section 4: Attachments -->
                <fieldset class="form-section">
                    <legend>Anexar Arquivos</legend>

                    <div class="file-list-controls">
                        <label class="checkbox-label">
                            <input type="checkbox" id="select-all-files">
                            <span>Selecionar Tudo</span>
                        </label>
                        <button type="button" class="btn-link" onclick="loadFileList()">Atualizar Lista</button>
                    </div>

                    <div id="file-list-container" class="file-list">
                        <p class="loading-text">Carregando arquivos...</p>
                    </div>
                </fieldset>

                <!-- Progress & Action -->
                <div id="email-progress-container" style="display: none; margin-top: 20px;">
                    <div class="progress-bar-bg">
                        <div id="email-progress-bar" class="progress-bar-fill" style="width: 0%"></div>
                    </div>
                    <small id="email-status-text">Enviando...</small>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="btn-send-email">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                        </svg>
                        Enviar Email
                    </button>
                </div>

            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="core.js"></script>
    <script src="email.js"></script>
    <script src="collection.js"></script>
</body>

</html>
