; Define qual ambiente é compilado por padrão (pio run / pio run -t upload)
; Para usar o scanner: pio run -e i2c_scanner -t upload
[platformio]
default_envs = esp32

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
; upload_port = /dev/ttyUSB1
; monitor_port = /dev/ttyUSB1
monitor_speed = 115200
build_flags =
  -std=gnu++17
  -Wall
  -DMIN_LOG_LEVEL=0
  ; Set this to control which logs are active:
  ;   0 = DEBUG and above (all logs)
  ;   1 = INFO and above (no DEBUG)
  ;   2 = WARN and above (no DEBUG, no INFO)
  ;   3 = ERROR only
  
; FAT Filesystem with custom partition table
board_build.filesystem = fatfs
board_build.partitions = partitions.csv

lib_deps =
  me-no-dev/AsyncTCP
  me-no-dev/ESPAsyncWebServer
  bblanchon/ArduinoJson@^6.21.0
  mobizt/ESP Mail Client@^3.4.17
  adafruit/Adafruit BusIO@^1.14.0
  adafruit/Adafruit ADS1X15@^2.5.0
  adafruit/Adafruit MCP4725@^2.0.2
build_src_filter = +<*>
extra_scripts =
  pre:scripts/embed_web.py
  pre:scripts/increment_version.py

; ── Algoritmos paralelos (não compilados por padrão) ────────
[env:i2c_scanner]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../content_data/parallel_development_algorithms/i2c_scanner/i2c_scanner.cpp>

[env:test_standalone]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
build_src_filter = -<*> +<../tests/test_standalone/test_standalone.cpp>
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit ADS1X15@^2.5.0
    adafruit/Adafruit MCP4725@^2.0.2

[env:dac_max_test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../tests/dac_max_test/dac_max_test.cpp>
lib_deps =
    adafruit/Adafruit MCP4725@^2.0.2
    adafruit/Adafruit ADS1X15@^2.5.0
    adafruit/Adafruit BusIO@^1.14.0

[env:dac_manual_test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../tests/dac_manual_test/dac_manual_test.cpp>
lib_deps =
    adafruit/Adafruit MCP4725@^2.0.2
    adafruit/Adafruit ADS1X15@^2.5.0
    adafruit/Adafruit BusIO@^1.14.0
